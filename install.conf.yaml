- defaults:
    link:
      relink: true
      create: true
    brewfile:
      stdout: true
      stderr: true
      include: ["tap", "brew", "cask", "mas"]
      sudo: brewuser

- clean: ["~"]

- shell:
    - [git submodule update --init --recursive]

- shell:
    - ["~/.dotfiles/priv_scripts/cargo-install"]

- shell:
    - [mkdir -p ~/.hammerspoon]

- link:
    ~/.config/nvim: nvim
    ~/.config/direnv: direnv
    ~/.hammerspoon/init.lua: hammerspoon/init.lua
    ~/.config/.profile: .profile
    ~/.config/.bashrc: .bashrc
    ~/.config/starship.toml: starship.toml
    ~/.claude/commands: claude/commands
    ~/.claude/agents: claude/agents
    ~/.claude/skills: claude/skills
    ~/.config/gh-dash: gh-dash
    ~/.claude/settings.json: claude/settings.json
    ~/.claude/CLAUDE.md: agents/AGENTS.md
    ~/.config/opencode/opencode.json: opencode/opencode.json
    ~/.config/opencode/prompts: claude/commands
    ~/.config/opencode/AGENTS.md: agents/AGENTS.md
    ~/.zshrc: zsh/.zshrc
    ~/.config/zed: zed
    ~/.zshenv:
      path: zsh/.zshenv
      force: true
    ~/.zprofile: zsh/.zprofile
    ~/.gitignore: git/gitignore
    ~/.gitconfig: git/gitconfig
    ~/.config/lazygit/config.yml: git/.lazygit.yml
    ~/scripts: scripts
    ~/.ignore: .ignore
    ~/.config/nushell: nushell
    ~/Library/Application Support/nushell: nushell
    ~/.config/ghostty: ghostty

- shell:
    - command: |
        if ! command -v brew >/dev/null 2>&1; then
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        fi
        if [ -x /opt/homebrew/bin/brew ]; then
          eval "$(/opt/homebrew/bin/brew shellenv)"
        elif [ -x /usr/local/bin/brew ]; then
          eval "$(/usr/local/bin/brew shellenv)"
        fi
        cd ~/.dotfiles && brew bundle
      stdin: true
      stdout: true
      stderr: true

- shell:
    - command: cd ~/.dotfiles/raycast-ghostty-sessionizer && npm install
      stdout: true
      stderr: true
